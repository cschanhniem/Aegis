apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis.gateway.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aegis.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aegis.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ include "aegis.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ default .Chart.AppVersion .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "{{ .Values.gateway.port }}"
            {{- if .Values.gateway.database.dbUrl }}
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis.fullname" . }}-config
                  key: DB_URL
            {{- else }}
            - name: DB_PATH
              value: /data/agentguard.db
            {{- end }}
            - name: AEGIS_LICENSE_TIER
              value: "{{ .Values.gateway.license.tier }}"
            {{- if .Values.gateway.license.key }}
            - name: AEGIS_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis.fullname" . }}-config
                  key: AEGIS_LICENSE_KEY
            {{- end }}
            {{- if .Values.gateway.apiKey }}
            - name: GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis.fullname" . }}-config
                  key: GATEWAY_API_KEY
            {{- end }}
            {{- range $k, $v := .Values.gateway.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if and (not .Values.gateway.database.dbUrl) .Values.gateway.database.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- if and (not .Values.gateway.database.dbUrl) .Values.gateway.database.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "aegis.gateway.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegis.gateway.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "aegis.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: gateway

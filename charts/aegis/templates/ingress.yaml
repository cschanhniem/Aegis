{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aegis.fullname" . }}
  labels: {{- include "aegis.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls: {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ if eq .service "gateway" }}{{ include "aegis.gateway.fullname" $ }}{{ else }}{{ include "aegis.cockpit.fullname" $ }}{{ end }}
                port:
                  number: {{ if eq .service "gateway" }}{{ $.Values.gateway.port }}{{ else }}{{ $.Values.cockpit.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AEGIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eae3d2;
        --surface: #f2edd8;
        --text: #0a0a0a;
        --muted: #5c5a50;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1816;
          --surface: #242220;
          --text: #eae3d2;
          --muted: #9a968b;
        }
      }
      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
        gap: 1.5rem;
      }
      .mark {
        font-family: "Instrument Serif", ui-serif, Georgia, serif;
        font-size: 2.6rem;
        letter-spacing: 0.18em;
        font-style: italic;
      }
      .status {
        font-size: 0.9rem;
        color: var(--muted);
        letter-spacing: 0.05em;
      }
      .dot {
        animation: pulse 1.4s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.25; }
        40% { opacity: 1; }
      }
      .err {
        margin-top: 0.6rem;
        font-size: 0.78rem;
        color: var(--muted);
        max-width: 28rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="mark">AEGIS</div>
      <div class="status">
        Starting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </div>
      <div class="err" id="err" hidden></div>
    </main>

    <script>
      // Cockpit sidecar URL — matches src-tauri/src/sidecars.rs COCKPIT_URL.
      const COCKPIT = 'http://127.0.0.1:13001';
      // Open the Welcome flow first; it auto-redirects to "/" the moment
      // the first trace lands, so returning users still land on the
      // dashboard via that path. Saves an extra navigation step on first run.
      const TARGET = COCKPIT + '/welcome';
      const MAX_TRIES = 60; // 60 × 500ms ≈ 30s headroom
      let tries = 0;

      async function probe() {
        tries += 1;
        try {
          const res = await fetch(COCKPIT + '/', { cache: 'no-store' });
          if (res.ok || res.status === 404) {
            // 404 still proves the server is up; Next routes may not
            // expose `/` for an unauth probe. Either way, redirect.
            window.location.replace(TARGET);
            return;
          }
        } catch (_) {
          /* not yet listening */
        }
        if (tries >= MAX_TRIES) {
          const el = document.getElementById('err');
          el.hidden = false;
          el.textContent =
            'Could not reach the embedded Cockpit on ' +
            COCKPIT +
            '. Check the AEGIS log in the system tray menu, or quit and reopen.';
          return;
        }
        setTimeout(probe, 500);
      }
      // Tiny delay so the splash is at least visible on fast machines.
      setTimeout(probe, 250);
    </script>
  </body>
</html>

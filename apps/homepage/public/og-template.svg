<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background: warm beige -->
  <rect width="1200" height="630" fill="#eae3d2"/>

  <!-- Hairline dividers -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#0a0a0a" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#0a0a0a" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="80" y="125" fill="#5c5a50" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="2">AOJIE  YUAN  ·  JUSTIN</text>

  <!-- Main headline -->
  <text x="80" y="280" fill="#0a0a0a" font-family="Instrument Serif, Tiempos Headline, Source Serif Pro, Georgia, serif" font-size="84" font-weight="400" letter-spacing="-1.5">

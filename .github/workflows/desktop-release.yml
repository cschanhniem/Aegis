name: Desktop Release

# Triggered on a version tag (e.g. v0.2.0) — builds macOS .dmg
# (both arches), Windows .exe + .msi, and Linux .deb + .AppImage,
# then uploads everything to the corresponding GitHub Release.
#
# Also publishes `latest.json` (Tauri auto-updater manifest) and
# `*.sha256` files alongside each binary so `install.sh` can verify.
#
# Set TAURI_SIGNING_PRIVATE_KEY in repo secrets to sign updater
# bundles. Leave it unset to ship unsigned (Gatekeeper will warn).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g. v0.2.0). Leave blank to use the workflow trigger ref.'
        required: false

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon runner
            target: aarch64-apple-darwin
            label: macOS / Apple Silicon
            artifact_glob: 'target/release/bundle/dmg/*_aarch64.dmg'
          - os: macos-13            # Intel runner
            target: x86_64-apple-darwin
            label: macOS / Intel
            artifact_glob: 'target/release/bundle/dmg/*_x64.dmg'
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux / x86_64
            artifact_glob: 'target/release/bundle/deb/*.deb target/release/bundle/appimage/*.AppImage'
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            label: Windows / x86_64
            artifact_glob: 'target/release/bundle/msi/*.msi target/release/bundle/nsis/*.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ matrix.target }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Build sidecar binaries
        working-directory: apps/desktop
        run: node scripts/prepare-sidecars.mjs

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop bundle
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS-only codesigning (skip silently if cert not set)
          APPLE_CERTIFICATE:        ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:   ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                 ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:           ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Generate SHA256 checksums
        shell: bash
        working-directory: apps/desktop/src-tauri
        run: |
          set -e
          for f in ${{ matrix.artifact_glob }}; do
            [ -e "$f" ] || continue
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*
          retention-days: 14

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/*.sha256
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.sha256
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.sha256
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/msi/*.sha256
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: false

  publish-updater-manifest:
    name: Publish updater manifest (latest.json)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          cat > latest.json <<JSON
          {
            "version": "$VERSION",
            "notes": "AEGIS $TAG — see release page",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/AEGIS_${VERSION}_aarch64.dmg"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/AEGIS_${VERSION}_x64.dmg"
              },
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/aegis_${VERSION}_amd64.AppImage"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/$TAG/AEGIS_${VERSION}_x64-setup.exe"
              }
            }
          }
          JSON
      - name: Attach latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json

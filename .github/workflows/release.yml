name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel
        working-directory: packages/sdk-python
        run: python -m build

      - name: Publish to PyPI
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --non-interactive --skip-existing

  publish-npm:
    name: Publish JS SDK to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (root workspace)
        run: npm ci

      - name: Build
        working-directory: packages/sdk-js
        run: npm run build

      - name: Publish to npm
        working-directory: packages/sdk-js
        run: npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Gateway Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${OWNER}/aegis-gateway" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/gateway-mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-npm, publish-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — macOS · Apple Silicon
  # Builds the Tauri shell + sidecar bundle (gateway + cockpit standalone
  # + portable Node) and uploads the .dmg to the release matching the tag.
  # ────────────────────────────────────────────────────────────────────
  desktop-macos-arm64:
    name: Build desktop (macOS arm64)
    runs-on: macos-14
    needs: [create-release]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install monorepo deps
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install librsvg (icon rasterizer)
        run: brew install librsvg

      - name: Build .app
        working-directory: apps/desktop
        run: cargo tauri build --bundles app

      - name: Package .dmg
        working-directory: apps/desktop
        run: bash scripts/make-dmg.sh

      - name: Upload .dmg to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/dmg/AEGIS_*.dmg
          fail_on_unmatched_files: true

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — Windows · x64  (provisional / WIP)
  # First runs are expected to fail — prepare-sidecars.sh assumes a
  # .tar.gz Node tarball but the Windows binary ships as .zip, and the
  # gateway's better-sqlite3 native module needs VS Build Tools that
  # aren't yet wired through the script. `continue-on-error: true` keeps
  # the failure from blocking the macOS asset upload while we iterate.
  # ────────────────────────────────────────────────────────────────────
  desktop-windows-x64:
    name: Build desktop (Windows x64) [WIP]
    runs-on: windows-latest
    needs: [create-release]
    timeout-minutes: 45
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install monorepo deps
        shell: bash
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Stage sidecars (Git Bash)
        shell: bash
        working-directory: apps/desktop
        run: bash scripts/prepare-sidecars.sh

      - name: Build .msi
        working-directory: apps/desktop
        run: cargo tauri build --bundles msi

      - name: Upload .msi to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

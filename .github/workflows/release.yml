name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch — lets us test desktop builds (Windows / Intel Mac
  # / Linux) without minting an actual release. Skips the publish jobs.
  workflow_dispatch:
    inputs:
      desktop_only:
        description: 'Skip PyPI/npm/Docker publishes — desktop builds only'
        type: boolean
        default: true

jobs:
  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel
        working-directory: packages/sdk-python
        run: python -m build

      - name: Publish to PyPI
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/* --non-interactive --skip-existing

  publish-npm:
    name: Publish JS SDK to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (root workspace)
        run: npm ci

      - name: Build
        working-directory: packages/sdk-js
        run: npm run build

      - name: Publish to npm
        working-directory: packages/sdk-js
        run: npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    name: Publish Gateway Docker image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${OWNER}/aegis-gateway" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/gateway-mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [publish-pypi, publish-npm, publish-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — macOS · Apple Silicon
  # Builds the Tauri shell + sidecar bundle (gateway + cockpit standalone
  # + portable Node) and uploads the .dmg to the release matching the tag.
  # ────────────────────────────────────────────────────────────────────
  desktop-macos-arm64:
    name: Build desktop (macOS arm64)
    runs-on: macos-14
    needs: [create-release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success') }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python 3.11 (node-gyp distutils compat)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install monorepo deps
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install librsvg (icon rasterizer)
        run: brew install librsvg

      - name: Build .app
        working-directory: apps/desktop
        run: cargo tauri build --bundles app

      - name: Package .dmg
        working-directory: apps/desktop
        run: bash scripts/make-dmg.sh

      - name: Upload .dmg to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/dmg/AEGIS_*.dmg
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-${{ github.run_id }}-${{ github.job }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/AEGIS_*.dmg
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — Windows · x64  (provisional / WIP)
  # First runs are expected to fail — prepare-sidecars.sh assumes a
  # .tar.gz Node tarball but the Windows binary ships as .zip, and the
  # gateway's better-sqlite3 native module needs VS Build Tools that
  # aren't yet wired through the script. `continue-on-error: true` keeps
  # the failure from blocking the macOS asset upload while we iterate.
  # ────────────────────────────────────────────────────────────────────
  desktop-windows-x64:
    name: Build desktop (Windows x64) [WIP]
    runs-on: windows-latest
    needs: [create-release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success') }}
    timeout-minutes: 45
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python 3.11 (node-gyp distutils compat)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install monorepo deps
        shell: bash
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Stage sidecars
        working-directory: apps/desktop
        run: node scripts/prepare-sidecars.mjs

      - name: Build .msi
        working-directory: apps/desktop
        run: cargo tauri build --bundles msi

      - name: Upload .msi to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-${{ github.run_id }}-${{ github.job }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — Linux · x64
  # Ubuntu runner. prepare-sidecars.sh is bash + downloads a Linux Node
  # tarball, so this path should "just work" — much closer to the macOS
  # flow than the Windows job. AppImage + .deb come out of `cargo tauri
  # build` natively.
  # ────────────────────────────────────────────────────────────────────
  desktop-linux-x64:
    name: Build desktop (Linux x64)
    runs-on: ubuntu-latest
    needs: [create-release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success') }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python 3.11 (node-gyp distutils compat)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install monorepo deps
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-bin \
            libssl-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build .AppImage + .deb
        working-directory: apps/desktop
        run: cargo tauri build --bundles deb

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-${{ github.run_id }}-${{ github.job }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — macOS · Intel (x86_64)
  # macos-13 runners still use Intel hardware, so the better-sqlite3
  # native module compiles natively to x86_64. macos-14 (Apple Silicon)
  # produces an arm64 binary that won't run on Intel Macs, hence the
  # separate job.
  # ────────────────────────────────────────────────────────────────────
  desktop-macos-x64:
    name: Build desktop (macOS x64 / Intel)
    runs-on: macos-13
    needs: [create-release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success') }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python 3.11 (node-gyp distutils compat)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install monorepo deps
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install librsvg
        run: brew install librsvg

      - name: Build .app
        working-directory: apps/desktop
        run: cargo tauri build --bundles app

      - name: Package .dmg
        working-directory: apps/desktop
        run: bash scripts/make-dmg.sh

      - name: Upload .dmg to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/dmg/AEGIS_*.dmg
          fail_on_unmatched_files: true

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-${{ github.run_id }}-${{ github.job }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/AEGIS_*.dmg
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────
  # Desktop app — Linux · arm64
  # GitHub announced ubuntu-22.04-arm and ubuntu-24.04-arm runners in
  # 2024 — same Tauri build, arm64 native, useful for Raspberry Pi 5
  # and arm-server users.
  # ────────────────────────────────────────────────────────────────────
  desktop-linux-arm64:
    name: Build desktop (Linux arm64)
    runs-on: ubuntu-24.04-arm
    needs: [create-release]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.create-release.result == 'success') }}
    timeout-minutes: 45
    continue-on-error: true  # arm runners are newer; let main release ship if this hiccups
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python 3.11 (node-gyp distutils compat)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install monorepo deps
        run: npm install --legacy-peer-deps

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-bin \
            libssl-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build .AppImage + .deb
        working-directory: apps/desktop
        run: cargo tauri build --bundles deb

      - name: Upload to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false

      - name: Upload as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-${{ github.run_id }}-${{ github.job }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
